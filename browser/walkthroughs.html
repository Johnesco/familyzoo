<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Family Zoo &mdash; Walkthroughs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: Georgia, serif; max-width: 860px; margin: 2em auto; padding: 0 1em; color: #2a2215; background: #f5eddb; line-height: 1.5; }
  h1 { font-size: 1.6em; }
  h2 { font-size: 1.1em; margin-top: 2em; padding-bottom: 4px; border-bottom: 1px solid #b89968; color: #4a2f10; }
  h2 a { color: inherit; text-decoration: none; }
  h2 a:hover { color: #6b3f1b; }
  pre { background: #ece1c2; padding: 10px 14px; border-left: 3px solid #6b3f1b; overflow-x: auto; font-family: Consolas, Monaco, monospace; font-size: 0.9em; }
  .toc { columns: 2; padding-left: 1.4em; }
  .toc a { color: #6b3f1b; }
  .play { font-size: 0.85em; color: #6b5a3a; margin-left: 8px; }
  .play a { color: #6b3f1b; }
</style>
</head>
<body>
<h1>Family Zoo &mdash; Tutorial Walkthroughs</h1>
<p>Each version's commands as run by the transcript test suite. Click any command list to view, or jump to <a href="index.html">the version index</a>.</p>

<ol class="toc" id="toc"></ol>
<div id="content"></div>

<script>
const versions = [
  ['v01', 'A Single Room'],
  ['v02', 'Multiple Rooms & Navigation'],
  ['v03', 'Scenery'],
  ['v04', 'Portable Objects'],
  ['v05', 'Containers & Supporters'],
  ['v06', 'Openable Things'],
  ['v07', 'Locked Doors & Keys'],
  ['v08', 'Light & Dark'],
  ['v09', 'Readable Objects'],
  ['v10', 'Switchable Devices'],
  ['v11', 'Non-Player Characters'],
  ['v12', 'Event Handlers'],
  ['v13', 'Custom Actions'],
  ['v14', 'Capability Dispatch'],
  ['v15', 'Timed Events'],
  ['v16', 'Scoring and Endgame'],
];

const toc = document.getElementById('toc');
const content = document.getElementById('content');

versions.forEach(([v, title]) => {
  const li = document.createElement('li');
  li.innerHTML = `<a href="#${v}">${v} &mdash; ${title}</a>`;
  toc.appendChild(li);
});

(async () => {
  for (const [v, title] of versions) {
    const h2 = document.createElement('h2');
    h2.id = v;
    h2.innerHTML = `<a href="#${v}">${v} &mdash; ${title}</a><span class="play"><a href="${v}/play.html">play this version</a></span>`;
    content.appendChild(h2);

    const pre = document.createElement('pre');
    pre.textContent = 'Loading...';
    content.appendChild(pre);

    try {
      const txt = await (await fetch(`${v}/walkthrough.txt`)).text();
      pre.textContent = txt.split('\n').map(l => l.trim() ? '> ' + l : '').join('\n');
    } catch (e) {
      pre.textContent = '(walkthrough not available)';
    }
  }
})();
</script>
</body>
</html>
